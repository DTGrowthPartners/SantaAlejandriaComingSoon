<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Santa Alejandría Hotel | Hotel Boutique en Cartagena y Medellín</title>
    <meta name="description" content="Santa Alejandría Hotel - Hotel boutique premium con sedes en Cartagena y Medellín, Colombia. Experiencias únicas de hospedaje. Reserva ahora por WhatsApp." />
    <meta name="author" content="Santa Alejandría Hotel" />
    <meta name="google-site-verification" content="NkMMNZzd7-jh3YIYQYHNbtLKZhntd0rGsosALMcbK_U" />
    <meta name="keywords" content="hotel boutique, Cartagena, Medellín, Colombia, hospedaje premium, hotel colonial, reservas" />
    <!-- canonical, hreflang and meta description are managed dynamically by react-helmet-async per route -->
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- OG and Twitter tags are managed dynamically by react-helmet-async per route -->
    
    <!-- SEO y Performance -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="theme-color" content="#0F172A" />
    <meta name="msapplication-TileColor" content="#0F172A" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/assets/hero-santa-alejandria.jpg" as="image" />
    <link rel="dns-prefetch" href="//wa.me" />
    
    <!-- Structured Data - Organization (global) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Santa Alejandría Hotel",
      "url": "https://santalejandriahotels.com",
      "logo": "https://santalejandriahotels.com/assets/logo-santa-alejandria.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+57-300-123-4567",
        "contactType": "reservations",
        "availableLanguage": ["Spanish", "English"]
      }
    }
    </script>
    <!-- Structured Data - WebSite (for sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Santa Alejandría Hotel",
      "url": "https://santalejandriahotels.com",
      "inLanguage": ["es", "en"]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
